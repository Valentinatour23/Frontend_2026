<section class="booking-section">
  <div class="booking-container">
    <h2 class="booking-title">Solicitá tu Reserva</h2>
    <p class="booking-subtitle">Completá tus datos y te redirigiremos a WhatsApp para finalizar el pago.</p>

    <form (ngSubmit)="procesarReserva(nuevaReserva.alojamiento)" #bookingForm="ngForm" class="booking-form">

      <div class="form-group">
        <label for="alojamiento">¿Qué Bungalow deseas reservar?</label>
        <select id="alojamiento" [(ngModel)]="nuevaReserva.alojamiento" name="alojamiento" class="form-control" required>
          <option [ngValue]="null" disabled selected>Seleccioná un bungalow...</option>
          <option *ngFor="let b of listaAlojamientos" [ngValue]="b">
  {{ b.nombre }}
</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" [(ngModel)]="nuevaReserva.usuario.nombre_usuario" name="nombreCliente" class="form-control" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono de Contacto</label>
          <input type="tel" id="telefono" [(ngModel)]="nuevaReserva.telefono" name="telefono" class="form-control" placeholder="Ej: 3447123456" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fechaInicio">Fecha de Ingreso</label>
          <input type="date" id="fechaInicio" [min]="fechaMinima" [(ngModel)]="nuevaReserva.fecha_inicio" name="fecha_inicio" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="fechaFin">Fecha de Egreso</label>
          <input type="date" id="fechaFin" [min]="fechaMinima" [(ngModel)]="nuevaReserva.fecha_fin" name="fecha_fin" class="form-control" required>
        </div>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label for="cantidadPersonas">Cantidad de Personas</label>
        <input type="number" id="cantidadPersonas" [(ngModel)]="nuevaReserva.cantidad_personas" name="cantidad_personas" class="form-control" min="1" max="10" required>
      </div>

      <button type="submit" [disabled]="!bookingForm.form.valid" class="btn-booking">
        <i class="fa-brands fa-whatsapp"></i> Confirmar Disponibilidad por WhatsApp
      </button>

    </form>
  </div>
</section>
